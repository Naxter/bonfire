version: 2
updates:
  # Grouped monthly version bumps keep PR noise low; security updates are
  # opened immediately regardless of this schedule.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns: ["*"]
      # Security fixes land immediately (good) but as ONE PR, not one per
      # advisory — most are transitive lockfile bumps anyway.
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
    ignore:
      # TypeScript 7 (the native compiler) breaks `next build`'s worker as of
      # Next 16.2 — revisit once Next supports it.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      # eslint-config-next (16.2.x) bundles an eslint-plugin-react that still
      # uses ESLint 9's rule-context API; ESLint 10 crashes on it.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    groups:
      python-dependencies:
        patterns: ["*"]
      pip-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
